<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Opname ABBQ</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="container">

    <img src="abbq_logo.png" class="logo">

    <h1>STOCK OPNAME ABBQ</h1>

    <div class="form-group">
        <label>Kategori</label>
        <select id="kategori">
            <option value="Kitchen">Kitchen</option>
            <option value="Frontliner">Frontliner</option>
        </select>
    </div>

    <div class="form-group">
        <label>Type</label>
        <select id="type">
            <option value="Daily">Daily</option>
            <option value="WM">Weekly/Monthly</option>
        </select>
    </div>

    <div class="form-group">
        <label>Tanggal</label>
        <input type="date" id="tanggal">
    </div>

    <button onclick="mulaiInput()">
        MULAI INPUT STOCK
    </button>

</div>

<script src="app.js"></script>

</body>
</html>

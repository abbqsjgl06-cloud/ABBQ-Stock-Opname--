<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>ABBQ Stock Opname</title>

    <link
        rel="stylesheet"
        href="style.css">

    <link
        rel="manifest"
        href="manifest.json">

    <meta
        name="theme-color"
        content="#FFD400">

</head>

<body>

    <!-- NOTIFIKASI -->
    <div
        id="notif"
        class="notif">
    </div>

    <div class="container">

        <!-- LOGO -->
        <img
            src="abbq_logo.png"
            class="logo"
            alt="ABBQ Logo">

        <h1>STOCK OPNAME ABBQ</h1>

        <!-- PIC -->
        <div class="form-group">

            <label>PIC</label>

            <input
                type="text"
                id="operator"
                placeholder="Masukkan Nama PIC">

        </div>

        <!-- KATEGORI -->
        <div class="form-group">

            <label>Kategori</label>

            <select id="kategori">

                <option value="">
                    -- Pilih Kategori --
                </option>

                <option value="Kitchen">
                    Kitchen
                </option>

                <option value="Frontliner">
                    Frontliner
                </option>

            </select>

        </div>

        <!-- TYPE -->
        <div class="form-group">

            <label>Type</label>

            <select id="type">

                <option value="">
                    -- Pilih Type --
                </option>

                <option value="Daily">
                    Daily
                </option>

                <option value="WM">
                    Weekly / Monthly
                </option>

            </select>

        </div>

        <!-- TANGGAL -->
        <div class="form-group">

            <label>Tanggal</label>

            <input
                type="date"
                id="tanggal">

        </div>

        <br>

        <!-- MULAI -->
        <button onclick="mulaiInput()">

            MULAI INPUT STOCK

        </button>

        <br><br>

        <!-- HISTORY -->
        <button
            onclick="window.location.href='history.html'">

            RIWAYAT STOCK OPNAME

        </button>

        <br><br>

        <!-- INSTALL -->
        <button
            id="installBtn"
            style="display:none;">

            INSTALL APP

        </button>

    </div>

    <div class="watermark">

        © 2026 Fdl

    </div>

    <script src="app.js"></script>

</body>

</html>

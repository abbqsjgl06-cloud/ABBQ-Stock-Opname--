<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>ABBQ Stock Opname</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- Judul -->
        <h2 id="judulHalaman"></h2>

        <!-- Notifikasi -->
        <div id="notif"></div>

        <!-- Tabel Stock -->
        <table class="table-stock">

            <thead>

                <tr>

                    <th>No</th>
                    <th>Kode</th>
                    <th>Item</th>
                    <th>Konv</th>
                    <th>UOM</th>
                    <th>PCS/Gr</th>

                </tr>

            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

        <br>

        <!-- Tombol Simpan -->
        <button onclick="simpanData()">
            SIMPAN
        </button>

        <br><br>

        <!-- Tombol Reset -->
        <button onclick="resetData()">
            RESET
        </button>

        <br><br>

        <!-- Tombol Export -->
        <button onclick="exportExcel()">
            EXPORT EXCEL
        </button>

        <br><br>

        <!-- Tombol Riwayat -->
        <button onclick="window.location.href='history.html'">
            RIWAYAT
        </button>

        <br><br>

        <!-- Tombol Menu Utama -->
        <button onclick="window.location.href='index.html'">
            MENU UTAMA
        </button>

    </div>

    <!-- Javascript -->
    <script src="input.js"></script>

    <!-- Jika ada file export excel -->
    <!--
    <script src="export.js"></script>
    -->

</body>

</html>

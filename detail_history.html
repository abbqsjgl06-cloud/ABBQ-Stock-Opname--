<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail History Stock Opname</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h2>DETAIL STOCK OPNAME</h2>

    <!-- INFO HEADER -->
    <div class="history-card">

        <h3 id="judul"></h3>

        <p><b>PIC:</b> <span id="pic"></span></p>
        <p><b>Tanggal:</b> <span id="tanggal"></span></p>
        <p><b>Waktu:</b> <span id="waktu"></span></p>

    </div>

    <!-- TABLE DETAIL -->
    <table class="table-stock">

        <thead>
            <tr>
                <th>No</th>
                <th>Kode</th>
                <th>Item</th>
                <th>Konv</th>
                <th>UOM</th>
                <th>Qty</th>
            </tr>
        </thead>

        <tbody id="detailBody"></tbody>

    </table>

    <br>

    <button onclick="window.location.href='history.html'">
        KEMBALI
    </button>

</div>

<!-- NOTIF -->
<div id="notif" class="notif"></div>

<script src="detail_history.js"></script>

</body>

</html>
